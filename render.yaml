services:
  - type: web
    name: galactic-archive-api
    runtime: node
    repo: https://github.com/Mahnoor-Zaffar/Galactic-Archive-API
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: galactic-archive-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: LOG_LEVEL
        value: combined
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run db:seed
    startCommand: npm start
    healthCheckPath: /api/v1/health

databases:
  - name: galactic-archive-db
    plan: free
    databaseName: galactic_archive
    region: ohio
